<?xml version="1.0" encoding="UTF-8"?>
<!--
  T-shirt silhouette mask. Opaque (white) inside the shirt body, transparent
  outside. Used as a Konva `destination-in` alpha mask so the customer's
  uploaded image is clipped to the shirt outline.
  Coordinates match tshirt-blank.svg (viewBox 600x800).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <path d="
      M 180 120
      L 110 170
      L 70  280
      L 150 330
      L 170 270
      L 170 720
      L 430 720
      L 430 270
      L 450 330
      L 530 280
      L 490 170
      L 420 120
      C 400 170 360 195 300 195
      C 240 195 200 170 180 120
      Z"
    fill="#ffffff"/>
</svg>
